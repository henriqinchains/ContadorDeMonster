<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animação de Chuva</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nova+Square&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="rain"></div>

    <main class="page-shell">
      <section class="login-card">
        <p class="eyebrow">Bem-vindo</p>
        <h1>Contador de <span>Monster</span></h1>
        <p class="subtitle">Acesse sua conta para continuar.</p>

        <form id="login-form">
          <label for="usuario">Usuário</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Digite seu usuário"
            autocomplete="username"
            required
          />

          <label for="senha">Senha</label>
          <div class="password-field">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" id="login-button">Entrar</button>
          <p id="login-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="chuva.js"></script>
    <script src="login.js" defer></script>
  </body>
</html>
