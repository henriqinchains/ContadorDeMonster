<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador de Monster</title>
    <link rel="icon" href="../../src/img/monster.png" />
    <link rel="stylesheet" href="login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nova+Square&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="rain"></div>

    <main class="page-shell">
      <section id="login-section" style="display: block" class="login-card">
        <p class="eyebrow">Bem-vindo</p>
        <h1>Contador de <span>Monster</span></h1>
        <p class="subtitle">Acesse sua conta para continuar.</p>

        <form id="login-form">
          <label for="usuario">Usuário</label>
          <input
            type="text"
            id="usuario-login"
            name="usuario"
            placeholder="Digite seu usuário"
            required
          />

          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha-login"
            name="senha"
            placeholder="Digite sua senha"
            required
          />

          <button type="submit" id="login-button">Entrar</button>
          <p style="display: none" id="login-message" aria-live="polite"></p>
          <p
            style="
              font-weight: 600;
              padding-left: 12px;
              color: #d3d3d3;
              font-family: Nova Square;
            "
          >
            Novo aqui?
            <a
              href="#"
              onclick="
                Switch();
                return false;
              "
              >Crie uma conta</a
            >
          </p>
        </form>
      </section>
      <section id="register-section" style="display: none" class="login-card">
        <p class="eyebrow">Bem-vindo</p>
        <h1>Contador de <span>Monster</span></h1>
        <p class="subtitle">Crie uma conta.</p>

        <form id="formCadastro">
          <label for="usuario">Usuário</label>
          <input
            type="text"
            id="usuario-cadastro"
            name="usuario"
            placeholder="Digite seu nome de usuário"
            required
          />

          <label for="email">E-mail</label>
          <input
            type="email"
            id="email-cadastro"
            name="email"
            placeholder="Digite seu email"
            required
          />

          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha-cadastro"
            name="senha"
            placeholder="Digite sua senha"
            required
          />

          <label for="confirm-senha">Confirmar Senha</label>
          <input
            type="password"
            id="confirm-senha-cadastro"
            name="confirm-senha"
            placeholder="Digite sua senha novamente"
            required
          />

          <button type="submit" id="register-button">Criar</button>
          <p style="display: none" id="cadastro-message" aria-live="polite"></p>
          <p
            style="
              font-weight: 600;
              padding-left: 12px;
              color: #d3d3d3;
              font-family: Nova Square;
            "
          >
            Ja possui uma conta?
            <a
              href="#"
              onclick="
                SwitchBack();
                return false;
              "
              >Faça login</a
            >
          </p>
        </form>
      </section>
    </main>

    <script src="chuva.js"></script>
    <script src="login.js" defer></script>
  </body>
</html>
